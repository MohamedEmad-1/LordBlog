server {
    listen 80;
    server_name blog.evelx.com;

    root /usr/share/nginx/html;

    # Serve homepage directly (no redirect) for SEO crawlability.
    # Canonical tag in the HTML already points to evelx.com/blog/.
    location = / {
        try_files /blog/index.html =404;
    }

    # Serve /blog assets & pages so CSS/JS/images load for the homepage
    location /blog {
        alias /usr/share/nginx/html/blog;
        try_files $uri $uri/ $uri/index.html /blog/404.html;
    }

    # Everything else → redirect to evelx.com/blog/...
    location / {
        return 301 https://evelx.com/blog$request_uri;
    }

    error_page 404 /blog/404.html;
}

server {
    listen 80 default_server;
    server_name evelx.com;

    root /usr/share/nginx/html;
    index index.html;

    # Cloudflare Worker guarantees only /blog/* traffic arrives here
    location /blog {
        alias /usr/share/nginx/html/blog;
        try_files $uri $uri/ $uri/index.html /blog/404.html;
    }

    # Fallback for anything else (shouldn't happen with the Worker)
    location / {
        return 404;
    }

    error_page 404 /blog/404.html;
}
